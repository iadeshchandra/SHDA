name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - run: |
        sudo apt update
        sudo apt install -y python3-pip openjdk-17-jdk
        pip install buildozer cython

    - run: buildozer android debug

    - uses: actions/upload-artifact@v4
      with:
        name: SHDA-APK
        path: bin/*.apk