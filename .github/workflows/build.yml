name: Build APK 🚀

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev uuid-dev libsqlite3-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --user --upgrade buildozer "cython<3.0.0"
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Build APK
      run: |
        # This will auto-accept licenses and build only for 64-bit
        yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SHDA-Management-App
        path: bin/*.apk
